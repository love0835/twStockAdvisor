<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TwStockAdvisor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">TW</div>
          <div>
            <h1>TwStockAdvisor</h1>
            <p>台股分析工作台</p>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-panel="portfolio">持倉</button>
          <button class="nav-btn" data-panel="analyze">分析</button>
          <button class="nav-btn" data-panel="report">績效</button>
          <button class="nav-btn" data-panel="backtest">回測</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="panel-title">持倉</h2>
            <p id="panel-subtitle">匯入現有持倉、現金與未實現損益</p>
          </div>
          <div class="status-pill" id="health-pill">API 連線中</div>
        </header>

        <section class="grid" id="portfolio-panel">
          <section class="band">
            <div class="section-head">
              <h3>持倉摘要</h3>
              <button class="icon-btn" id="refresh-portfolio" title="重新整理">↻</button>
            </div>
            <div class="stats" id="portfolio-stats"></div>
            <div class="table-wrap">
              <table id="portfolio-table">
                <thead>
                  <tr>
                    <th>股票</th>
                    <th>股數</th>
                    <th>均價</th>
                    <th>現價</th>
                    <th>未實現損益</th>
                    <th>報酬率</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </section>

          <section class="band">
            <div class="section-head">
              <h3>匯入持倉</h3>
            </div>
            <form id="portfolio-import-form" class="form-grid">
              <label>
                <span>CSV 路徑</span>
                <input name="csv_path" value="E:/TwStockAdvisor/data/taishin_portfolio.csv" />
              </label>
              <label>
                <span>現金</span>
                <input name="cash" value="260576.0" />
              </label>
              <label>
                <span>儲存位置</span>
                <input name="storage_path" value="data/portfolio.json" />
              </label>
              <button type="submit" class="primary-btn">匯入</button>
            </form>
            <div class="result-box" id="portfolio-import-result"></div>
          </section>
        </section>

        <section class="grid hidden" id="analyze-panel">
          <section class="band">
            <div class="section-head">
              <h3>單次分析</h3>
            </div>
            <form id="analyze-form" class="form-grid">
              <label>
                <span>策略</span>
                <select name="strategy">
                  <option value="daytrade">當沖 / 日內交易</option>
                  <option value="swing" selected>短線波段</option>
                  <option value="position">中期波段 / 部位交易</option>
                  <option value="longterm">長期投資</option>
                  <option value="dividend">存股 / 股息策略</option>
                </select>
              </label>
              <label>
                <span>觀察清單</span>
                <input name="watchlist" value="2330" />
              </label>
              <label>
                <span>持倉檔案</span>
                <input name="storage_path" value="data/portfolio.json" />
              </label>
              <button type="submit" class="primary-btn">執行分析</button>
            </form>
          </section>

          <section class="band">
            <div class="section-head">
              <h3>市場掃描 · AI 推薦</h3>
            </div>
            <div class="scanner-common">
              <label>
                <span>推薦檔數</span>
                <input type="number" id="scanner-top-n" value="5" min="1" max="20" />
              </label>
              <label class="checkbox">
                <input type="checkbox" id="scanner-exclude-holdings" checked />
                <span>排除已持有</span>
              </label>
            </div>
            <div class="scanner-actions">
              <div class="scanner-block">
                <div class="scanner-block-head">當沖推薦</div>
                <label class="checkbox">
                  <input type="checkbox" id="scanner-exclude-etf" checked />
                  <span>排除 ETF / ETN / 槓反</span>
                </label>
                <button class="primary-btn" id="scan-daytrade-btn">掃描當沖標的</button>
              </div>
              <div class="scanner-block">
                <div class="scanner-block-head">短線推薦</div>
                <label>
                  <span>外資連續買超天數</span>
                  <select id="scanner-foreign-days">
                    <option value="0">不要求</option>
                    <option value="2">連 2 日</option>
                    <option value="3" selected>連 3 日</option>
                    <option value="5">連 5 日</option>
                    <option value="7">連 7 日</option>
                    <option value="10">連 10 日</option>
                  </select>
                </label>
                <button class="primary-btn" id="scan-swing-btn">掃描短線標的</button>
              </div>
            </div>
            <div class="scanner-meta" id="scanner-meta">尚未掃描</div>
            <div class="table-wrap">
              <table id="scanner-table">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>股票</th>
                    <th>信心</th>
                    <th>進場區間</th>
                    <th>停損</th>
                    <th>停利</th>
                    <th>理由</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div class="scanner-decision-actions">
              <button class="secondary-btn" id="scanner-ai-decision-btn" disabled>用 AI 做交易決策</button>
              <span id="scanner-decision-hint">請先掃描出候選標的，再交給 AI 參考持倉與餘額。</span>
            </div>
          </section>

          <section class="band">
            <div class="section-head">
              <h3>分析結果</h3>
            </div>
            <div class="market-view" id="market-view">尚未執行</div>
            <div class="table-wrap">
              <table id="analyze-table">
                <thead>
                  <tr>
                    <th>股票</th>
                    <th>動作</th>
                    <th>張數 / 股數</th>
                    <th>下單價</th>
                    <th>停損</th>
                    <th>停利</th>
                    <th>警示</th>
                    <th>理由</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div class="result-box" id="analyze-meta"></div>
          </section>
        </section>

        <section class="grid hidden" id="report-panel">
          <section class="band">
            <div class="section-head">
              <h3>績效報告</h3>
            </div>
            <form id="report-form" class="inline-form">
              <label>
                <span>區間</span>
                <input name="period" value="30d" />
              </label>
              <button type="submit" class="primary-btn">查詢</button>
            </form>
            <div class="stats" id="report-stats"></div>
          </section>
        </section>

        <section class="grid hidden" id="backtest-panel">
          <section class="band">
            <div class="section-head">
              <h3>歷史回測</h3>
            </div>
            <form id="backtest-form" class="form-grid">
              <label>
                <span>策略</span>
                <select name="strategy">
                  <option value="daytrade">當沖 / 日內交易</option>
                  <option value="swing" selected>短線波段</option>
                  <option value="position">中期波段 / 部位交易</option>
                  <option value="longterm">長期投資</option>
                  <option value="dividend">存股 / 股息策略</option>
                </select>
              </label>
              <label>
                <span>股票</span>
                <input name="symbols" value="2330,2317" />
              </label>
              <label>
                <span>開始</span>
                <input name="from_date" value="2024-01-01" />
              </label>
              <label>
                <span>結束</span>
                <input name="to_date" value="2024-12-31" />
              </label>
              <label>
                <span>初始資金</span>
                <input name="initial_cash" value="1000000" />
              </label>
              <button type="submit" class="primary-btn">執行回測</button>
            </form>
          </section>

          <section class="band">
            <div class="section-head">
              <h3>回測結果</h3>
            </div>
            <div class="stats" id="backtest-stats"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
